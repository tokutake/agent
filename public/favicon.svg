<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1a140a"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3b341"/>
      <stop offset="100%" stop-color="#f5c869"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Bird / oracle dove silhouette -->
  <g fill="url(#gold)">
    <!-- body -->
    <path d="M14 38c-3-7 1-15 9-17 3-6 11-9 17-5 4-1 8 1 9 5 4 1 6 5 4 9-2 3-6 4-9 3-1 4-5 7-10 7-1 3-3 5-6 5-2 0-3-1-3-3 0-1 1-2 2-3-4-1-9-2-13-6z"/>
    <!-- wing accent -->
    <path d="M26 28c4-1 8 1 10 4-3 1-7 1-10-4z" fill="#0a0805" opacity="0.35"/>
    <!-- eye -->
    <circle cx="40" cy="27" r="2" fill="#0a0805"/>
    <!-- beak -->
    <path d="M49 30l6-2-5 5z"/>
  </g>
  <!-- radiant rays suggesting oracle / divination -->
  <g stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="32" y1="6" x2="32" y2="11"/>
    <line x1="11" y1="15" x2="14" y2="18"/>
    <line x1="53" y1="15" x2="50" y2="18"/>
    <line x1="7" y1="36" x2="12" y2="36"/>
    <line x1="57" y1="36" x2="52" y2="36"/>
  </g>
</svg>
